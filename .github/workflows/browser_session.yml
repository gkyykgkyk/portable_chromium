name: Browser Session

on:
  workflow_dispatch:
    inputs:
      macro:
        description: 'اسم الماكرو المطلوب تنفيذه (اتركه فارغاً لجلسة بدون ماكرو)'
        required: false
        default: ''
        type: string
      duration:
        description: 'مدة تشغيل المتصفح بالدقائق (الافتراضي 10)'
        required: false
        default: '10'
        type: string

jobs:
  run-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # 1. Checkout the repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Try to download session from last run's artifact
      - name: Download previous session (artifact)
        id: artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: browser-session
          workflow: browser_session.yml
          if_no_artifact_found: warn
          search_artifacts: true

      # 3. If no artifact, download from GitHub Release as fallback
      - name: Download session from Release (fallback)
        if: steps.artifact.outcome == 'failure' || !hashFiles('session.crsession')
        run: |
          if [ ! -f "session.crsession" ]; then
            echo "📥 Downloading session from GitHub Release..."
            curl -L -o session.crsession "https://github.com/gkyykgkyk/portable_chromium/releases/download/%D8%AB%D9%8A/session.crsession"
            echo "✅ Downloaded session from Release ($(du -h session.crsession | cut -f1))"
          else
            echo "✅ Session already exists from artifact"
          fi

      # 4. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 5. Install dependencies
      - name: Install dependencies
        run: |
          pip install playwright pyzipper
          playwright install chromium
          playwright install-deps

      # 6. Install xvfb for virtual display (headed mode support)
      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      # 7. Run the browser session with xvfb (virtual display)
      - name: Run browser session
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          VLESS_LINK: ${{ secrets.VLESS_LINK }}
          MACRO_NAME: ${{ inputs.macro }}
          SESSION_DURATION: ${{ inputs.duration }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 2
          python main.py run-action

      # 8. Upload the updated session as artifact
      - name: Upload updated session
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-session
          path: session.crsession
          retention-days: 90
          overwrite: true
