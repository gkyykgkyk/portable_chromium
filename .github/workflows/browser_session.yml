name: Browser Session

on:
  workflow_dispatch:
    inputs:
      macro:
        description: 'Macro name (leave empty for no macro)'
        required: false
        default: ''
        type: string
      duration:
        description: 'Duration in minutes (default 10)'
        required: false
        default: '10'
        type: string

jobs:
  run-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download previous session (artifact)
        id: artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: browser-session
          workflow: browser_session.yml
          if_no_artifact_found: warn
          search_artifacts: true

      - name: Download session from Release (fallback)
        if: steps.artifact.outcome == 'failure' || !hashFiles('session.crsession')
        env:
          SESSION_URL: ${{ secrets.SESSION_URL }}
        run: |
          if [ ! -f "session.crsession" ] && [ -n "$SESSION_URL" ]; then
            echo "Downloading session from GitHub Release..."
            curl -L -o session.crsession "$SESSION_URL"
            echo "Downloaded session from Release"
          elif [ -f "session.crsession" ]; then
            echo "Session already exists from artifact"
          else
            echo "No session found and SESSION_URL secret is not set"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pyzipper requests pyautogui opencv-python pynput pyperclip
          playwright install chromium
          playwright install-deps

      - name: Install xvfb and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb scrot imagemagick python3-tk python3-xlib xdotool xclip openbox x11vnc xrdp unzip wget

      - name: Setup Xray Proxy
        run: |
          mkdir -p xray
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip -d xray
          chmod +x xray/xray
          rm xray.zip

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        continue-on-error: true
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gh-browser

      - name: Run browser session
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          VLESS_LINK: ${{ secrets.VLESS_LINK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MACRO_URL: ${{ secrets.MACRO_URL }}
          MACRO_NAME: ${{ inputs.macro }}
          SESSION_DURATION: ${{ inputs.duration }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          DISPLAY=:99 openbox &
          sleep 1
          TS_IP=$(tailscale ip -4 2>/dev/null || true)
          if [ -n "$TS_IP" ]; then
            echo "Tailscale connected: $TS_IP"
            echo "runner:admin" | sudo chpasswd || true
            x11vnc -display :99 -forever -shared -rfbport 5900 -nopw -bg -o /tmp/x11vnc.log || true
            sudo pkill xrdp || true
            sudo pkill xrdp-sesman || true
            sleep 1
            sudo tee /etc/xrdp/xrdp.ini > /dev/null << 'XRDPEOF'
          [Globals]
          ini_version=1
          port=3389
          use_vsock=false
          security_layer=negotiate
          crypt_level=high
          certificate=
          key_file=
          ssl_protocols=TLSv1.2, TLSv1.3
          autorun=BrowserVNC
          allow_channels=true
          max_bpp=32

          [Logging]
          LogFile=xrdp.log
          LogLevel=CORE

          [Channels]
          rdpdr=true
          rdpsnd=true
          cliprdr=true

          [BrowserVNC]
          name=Browser Session
          lib=libvnc.so
          ip=127.0.0.1
          port=5900
          username=na
          password=na
          XRDPEOF
            sudo /usr/sbin/xrdp || true
            sudo /usr/sbin/xrdp-sesman || true
            echo "RDP Ready: ${TS_IP}:3389 (user: runner / pass: admin)"
            if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
              curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d "chat_id=${TELEGRAM_CHAT_ID}" -d "text=RDP Ready! IP: ${TS_IP}:3389 | user: runner | pass: admin" || true
            fi
          fi
          python main.py run-action

      - name: Upload updated session
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-session
          path: session.crsession
          retention-days: 90
          overwrite: true
