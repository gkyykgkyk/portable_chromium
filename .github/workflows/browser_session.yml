name: Browser Session

on:
  workflow_dispatch:
    inputs:
      macro:
        description: 'اسم الماكرو المطلوب تنفيذه (اتركه فارغاً لجلسة بدون ماكرو)'
        required: false
        default: ''
        type: string
      duration:
        description: 'مدة تشغيل المتصفح بالدقائق (الافتراضي 10)'
        required: false
        default: '10'
        type: string

jobs:
  run-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # 1. Checkout the repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Try to download session from last run's artifact
      - name: Download previous session (artifact)
        id: artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: browser-session
          workflow: browser_session.yml
          if_no_artifact_found: warn
          search_artifacts: true

      # 3. If no artifact, download from GitHub Release as fallback
      - name: Download session from Release (fallback)
        if: steps.artifact.outcome == 'failure' || !hashFiles('session.crsession')
        env:
          SESSION_URL: ${{ secrets.SESSION_URL }}
        run: |
          if [ ! -f "session.crsession" ] && [ -n "$SESSION_URL" ]; then
            echo "📥 Downloading session from GitHub Release..."
            curl -L -o session.crsession "$SESSION_URL"
            echo "✅ Downloaded session from Release ($(du -h session.crsession | cut -f1))"
          elif [ -f "session.crsession" ]; then
            echo "✅ Session already exists from artifact"
          else
            echo "⚠️ No session found and SESSION_URL secret is not set"
          fi

      # 4. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 5. Install dependencies
      - name: Install dependencies
        run: |
          pip install playwright pyzipper requests pyautogui opencv-python pynput pyperclip
          playwright install chromium
          playwright install-deps

      # 6. Install xvfb, screenshot tools, macro deps, and remote desktop
      - name: Install xvfb and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb scrot imagemagick python3-tk python3-xlib xdotool xclip \
            openbox x11vnc xrdp

      # 7. Setup Tailscale VPN for remote access
      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gh-browser
        continue-on-error: true

      # 8. Run browser session with xvfb + remote desktop
      - name: Run browser session
        env:
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          VLESS_LINK: ${{ secrets.VLESS_LINK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MACRO_URL: ${{ secrets.MACRO_URL }}
          MACRO_NAME: ${{ inputs.macro }}
          SESSION_DURATION: ${{ inputs.duration }}
          DISPLAY: ':99'
        run: |
          # Start virtual display
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2

          # Start window manager on :99 (needed for browser window management)
          DISPLAY=:99 openbox &
          sleep 1

          # Setup Remote Desktop if Tailscale is connected
          TS_IP=$(tailscale ip -4 2>/dev/null || echo "")
          if [ -n "$TS_IP" ]; then
            echo "🌐 Tailscale connected: $TS_IP"

            # Share existing :99 display via x11vnc (no password - secured by Tailscale)
            x11vnc -display :99 -forever -shared -rfbport 5900 -nopw -bg -o /tmp/x11vnc.log

            # Configure xrdp to proxy to x11vnc (same display as browser)
            sudo python3 -c "
import re
with open('/etc/xrdp/xrdp.ini','r') as f: c=f.read()
c=re.sub(r'\[xrdp1\].*?(?=\n\[|\Z)',
'[xrdp1]\nname=Browser\nlib=libvnc.so\nip=127.0.0.1\nport=5900\nusername=na\npassword=na\n',
c, flags=re.DOTALL)
with open('/etc/xrdp/xrdp.ini','w') as f: f.write(c)
"

            # Start xrdp service
            sudo /usr/sbin/xrdp
            sudo /usr/sbin/xrdp-sesman

            echo "🖥️ RDP Ready: ${TS_IP}:3389"

            # Notify via Telegram
            if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
              curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d "chat_id=${TELEGRAM_CHAT_ID}" \
                -d "text=🖥️ Remote Desktop جاهز!
          🌐 Tailscale IP: ${TS_IP}
          📋 افتح Remote Desktop Connection
              Computer: ${TS_IP}
          ⚡ نفس الشاشة اللي المتصفح شغال فيها!
          📐 Resolution: 1920x1080"
            fi
          fi

          python main.py run-action

      # 9. Upload the updated session as artifact
      - name: Upload updated session
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-session
          path: session.crsession
          retention-days: 90
          overwrite: true
